# ============================================
# GlowStudio AI - Nginx Configuration
# ============================================
# Proxy reverso para Streamlit com rate limiting,
# headers de segurança e suporte a WebSocket.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 15M;

    # --- Rate Limiting (30 req/min por IP) ---
    limit_req_zone $binary_remote_addr zone=glowstudio_limit:10m rate=30r/m;

    # --- Upstream Streamlit ---
    upstream streamlit {
        server glowstudio:8501;
    }

    # --- HTTP Server (redireciona para HTTPS em produção) ---
    server {
        listen 80;
        server_name _;

        # Certbot challenge (para geração de SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redireciona tráfego HTTP para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS Server (produção) ---
    server {
        listen 443 ssl http2;
        server_name glowstudio.seudominio.com; # Alterar no deploy

        ssl_certificate /etc/letsencrypt/live/glowstudio.seudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/glowstudio.seudominio.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            limit_req zone=glowstudio_limit burst=20 nodelay;
            proxy_pass http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        location /_stcore/stream {
            proxy_pass http://streamlit/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # --- HTTPS Server (n8n Produção) ---
    server {
        listen 443 ssl http2;
        server_name n8n.seudominio.com; # Alterar no deploy

        ssl_certificate /etc/letsencrypt/live/glowstudio.seudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/glowstudio.seudominio.com/privkey.pem;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
